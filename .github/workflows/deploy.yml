name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server host key
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync code to server
        run: |
          rsync -rltDvz --delete \
            --no-perms --no-owner --no-group \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='dist' \
            --exclude='data' \
            --exclude='uploads' \
            --exclude='.env' \
            --exclude='*.db' \
            ./ ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:~/blog/

      - name: Apply production config
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            cd ~/blog
            # Enable SSL in nginx.conf
            sed -i 's|# ssl_certificate_key |ssl_certificate_key |' frontend/nginx.conf
            sed -i 's|# ssl_certificate |ssl_certificate |' frontend/nginx.conf
            sed -i 's|# ssl_protocols|ssl_protocols|' frontend/nginx.conf
            sed -i 's|# ssl_ciphers|ssl_ciphers|' frontend/nginx.conf
            sed -i 's|your-domain|gianniiss.top|g' frontend/nginx.conf
            # Enable SSL cert mount and notes volume in docker-compose.yml
            sed -i 's|# - /etc/letsencrypt|      - /etc/letsencrypt|' docker-compose.yml
            sed -i 's|# - /home/ubuntu/notes-content|      - /home/ubuntu/notes-content|' docker-compose.yml
          "

      - name: Rebuild containers
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
            cd ~/blog
            docker compose up -d --build
            docker system prune -f
          "
